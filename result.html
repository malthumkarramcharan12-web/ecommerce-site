<h2>Result</h2>

<p>Score: {{ score }}%</p>

<h3>Matched Skills</h3>
<ul>
{% for s in skills %}
<li>{{ s }}</li>
{% endfor %}
</ul>

<h3>Missing Skills</h3>
<ul>
{% for m in missing %}
<li>{{ m }}</li>
{% endfor %}
</ul>

<h3>Suggestions</h3>
<ul>
{% for s in suggestions %}
<li>{{ s }}</li>
{% endfor %}
</ul>
